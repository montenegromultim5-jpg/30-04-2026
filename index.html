<div id="app"></div>
<div id="lightbox" class="lightbox"></div>
<div id="modal" class="modal-overlay"></div>
<div id="toast" class="toast"></div>
<div id="selBar" class="selection-bar"></div>

<script>
// ─── CONFIGURACIÓN ───────────────────────────────────────────────────────────
var DRIVE_URL = 'https://script.google.com/macros/s/AKfycbyOHqGAerDWpOqX9p8fQ3dzGNH8WI23XxWn2GKQBZKb8YfUXpvTcSFzJGHlrp75s1PR8Q/exec';
var BASE_URL = '';
var config = { nombre: 'Tu Nombre', contacto: '' };

// ─── CACHÉ ───────────────────────────────────────────────────────────────────
var galeriasCache = null;
var detalleCache  = {};
var CONFIG_TTL_MS = 60 * 60 * 1000; // 1 hora

function loadConfigCache() {
    try {
        var raw = localStorage.getItem('mgp_config');
        if (!raw) return null;
        var obj = JSON.parse(raw);
        if (Date.now() - obj.ts > CONFIG_TTL_MS) { localStorage.removeItem('mgp_config'); return null; }
        return obj.data;
    } catch(e) { return null; }

// Detectar BASE_URL correctamente
(function detectBaseUrl() {
    var origin = location.origin;
    if (origin && origin !== 'null' && origin !== 'undefined' && origin.indexOf('http') === 0) {
        BASE_URL = origin + location.pathname;
    } else {
        // fallback: usar la URL actual sin parámetros
        var current = window.location.href;
        var qIndex = current.indexOf('?');
        BASE_URL = qIndex !== -1 ? current.substring(0, qIndex) : current;
        if (BASE_URL.indexOf('http') !== 0) BASE_URL = '';
    }
})();

];

// ─── UTILIDADES ──────────────────────────────────────────────────────────────
function getBase() {
    if (BASE_URL && BASE_URL.indexOf('http') === 0) return BASE_URL;
    var origin = location.origin;
    if (origin && origin !== 'null' && origin !== 'undefined' && origin.indexOf('http') === 0) {
        return origin + location.pathname;
    }
    return '';
}

async function drive(action, params) {
    params = params || {};
    var url = DRIVE_URL + '?action=' + action;
    for (var k in params) url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
    var controller = new AbortController();
    var tid = setTimeout(function() { controller.abort(); }, 30000);
    try {
        var r = await fetch(url, { signal: controller.signal });
        clearTimeout(tid);
        var d = await r.json();
        if (d.error) throw new Error(d.error);
        return d;
    } catch(e) {
        clearTimeout(tid);
        throw e;
    }
}

function esc(s)   { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escJS(s) { if (s == null) return ''; return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function shareLink(id) {
    var b = getBase();
    if (!b) return '';
    return b + (b.indexOf('?') === -1 ? '?g=' : '&g=') + id;
}

function formatDate(d) {
    if (!d) return '';
    try { var dt = new Date(d); if (isNaN(dt)) return ''; var m = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']; return m[dt.getMonth()] + ' ' + dt.getDate() + ', ' + dt.getFullYear(); } catch(e) { return ''; }
}
function formatDateFull(d) {
    if (!d) return '';
    try { var dt = new Date(d); if (isNaN(dt)) return ''; var m = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']; return dt.getDate() + ' de ' + m[dt.getMonth()] + ', ' + dt.getFullYear(); } catch(e) { return ''; }
}

function copyText(t) {
    if (navigator.clipboard) { navigator.clipboard.writeText(t).then(function() { showToast('Copiado', 'check-circle'); }).catch(function() { fbCopy(t); }); }
    else { fbCopy(t); }
}
function fbCopy(t) {
    var a = document.createElement('textarea'); a.value = t; a.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(a); a.select(); document.execCommand('copy'); document.body.removeChild(a);
    showToast('Copiado', 'check-circle');
}

function showToast(msg, icon) {
    icon = icon || 'check-circle';
    var t = document.getElementById('toast'); if (!t) return;
    t.innerHTML = '<i data-lucide="' + esc(icon) + '"></i>' + esc(msg);
    t.classList.add('show');
    try { lucide.createIcons({ nodes: [t] }); } catch(e) {}
    clearTimeout(t._t);
    t._t = setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function downloadFile(src, name) {
    fetch(src)
        .then(function(r) { return r.blob(); })
        .then(function(blob) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a'); a.href = url; a.download = name || 'foto.jpg';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
        })
        .catch(function() {
            var a = document.createElement('a'); a.href = src; a.download = name || 'foto.jpg'; a.target = '_blank';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        });
}

function getSectionPhotos(det, sid) {
    if (!det || !det.secciones) return [];
    if (sid === 'all') return det.secciones.reduce(function(a, s) { return a.concat(s.fotos || []); }, []);
    var sec = det.secciones.find(function(s) { return s.id === sid; });
    return sec ? (sec.fotos || []) : [];
}
function getAllPhotos(det) { return getSectionPhotos(det, 'all'); }

function getFontCSS(id, size) {
    var f = FONTS.find(function(x) { return x.id === id; });
    return "font-family:'" + (f ? f.name : 'Playfair Display') + "',serif;font-size:" + (size || 22) + "px;";
}

function startTimer(elId) {
    var start = Date.now();
    var iv = setInterval(function() {
        var el = document.getElementById(elId);
        if (el) el.textContent = ((Date.now() - start) / 1000).toFixed(1) + 's';
    }, 100);
    return function() { clearInterval(iv); };
}

        '<div style="min-height:100vh"><header class="admin-header"><button class="detail-back" onclick="navigate(\'/\')"><i data-lucide="arrow-left"></i> Galerías</button><div style="display:flex;align-items:center;gap:4px"><button class="btn btn-ghost btn-icon" onclick="showSettings()"><i data-lucide="settings"></i></button></div></header><div class="container"><div class="loading-state"><div class="spinner"></div><p>Cargando galería</p><span class="loading-timer" id="gT">0.0s</span></div></div></div>';
    try { lucide.createIcons(); } catch(e) {}

        stop();

    } catch(e) {
        stop();
        document.getElementById('app').innerHTML =
            '<div style="min-height:100vh"><header class="admin-header"><button class="detail-back" onclick="navigate(\'/\')"><i data-lucide="arrow-left"></i> Galerías</button></header><div class="container"><div class="empty-state"><h3>Error al cargar</h3><button class="btn btn-primary" onclick="renderGalleryDetail(\'' + escJS(id) + '\')"><i data-lucide="refresh-cw"></i> Reintentar</button></div></div></div>';
        try { lucide.createIcons(); } catch(e2) {}
    }
}

function renderGalleryInner(id, d) {

                var clickAction = selectMode
                    ? 'toggleSelect(\'' + safePid + '\',\'' + safeSecId + '\')'
                    : 'openLightbox(getSectionPhotos(detalleCache[\'' + escJS(id) + '\'], \'' + escJS(currentSectionId) + '\'), ' + i + ')';
                var checkAction = 'event.stopPropagation();if(!selectMode)return;toggleSelect(\'' + safePid + '\',\'' + safeSecId + '\')';
                return '<div class="admin-photo-item ' + (sel ? 'selected' : '') + '" data-did="' + esc(p.id) + '" onclick="' + clickAction + '">' +

                    '<div class="photo-check ' + (sel ? 'checked' : '') + '" onclick="' + checkAction + '"><i data-lucide="check"></i></div>' +
                    '<div class="photo-controls" onclick="event.stopPropagation()">' +

                    '<button class="del" onclick="doDelFoto(\'' + escJS(id) + '\',\'' + safePid + '\')"><i data-lucide="trash-2"></i></button>' +
                    '</div></div>';
            }).join('') + '</div>';
    }

    var showCovBadge = (d.meta && d.meta.showCover)
        ? '<div class="move-target" style="margin-bottom:16px;background:var(--bg2);cursor:default;border-style:dashed"><i data-lucide="image" style="color:var(--drive)"></i><span>Portada activada</span></div>'
        : '';

    var diasStr = '';

        diasStr = ' · <span style="color:' + (d.diasRestantes <= 30 ? '#dc2626' : 'var(--text2)') + '">' + d.diasRestantes + ' días restantes</span>';
    }

    document.getElementById('app').innerHTML =
        '<div style="min-height:100vh"><header class="admin-header">' +
        '<button class="detail-back" onclick="navigate(\'/\')"><i data-lucide="arrow-left"></i> Galerías</button>' +
        '<div style="display:flex;align-items:center;gap:4px">' +
        '<button class="btn btn-ghost btn-icon" onclick="renderGalleryDetail(\'' + escJS(id) + '\')"><i data-lucide="refresh-cw"></i></button>' +
        '<button class="btn btn-ghost btn-icon" onclick="showSettings()"><i data-lucide="settings"></i></button>' +
        '</div></header><div class="container">' +
        '<div class="detail-header"><div>' +
        '<div class="detail-title">' + esc(d.nombre) + '</div>' +
        '<div style="font-size:14px;color:var(--text2);margin-top:4px">' + allP.length + ' foto' + (allP.length !== 1 ? 's' : '') + ' · ' + (d.secciones || []).length + ' sección' + ((d.secciones || []).length !== 1 ? 'es' : '') + diasStr + '</div>' +
        '</div><div class="detail-actions">' +
        '<button class="btn btn-primary btn-sm" onclick="showShare(\'' + escJS(id) + '\')"><i data-lucide="share-2"></i> Compartir</button>' +
        '<button class="btn btn-secondary btn-sm" onclick="showCoverEditor(\'' + escJS(id) + '\')"><i data-lucide="image"></i> Portada</button>' +
        '<button class="btn btn-secondary btn-sm" onclick="showAddSec(\'' + escJS(id) + '\')"><i data-lucide="folder-plus"></i> Sección</button>' +
        '<button class="btn btn-danger btn-sm" onclick="confirmDelGal(\'' + escJS(id) + '\',\'' + escJS(d.nombre) + '\')"><i data-lucide="trash-2"></i></button>' +
        '</div></div>' + showCovBadge +
        '<div id="selBanner" class="select-banner ' + (selectMode ? 'visible' : '') + '"><i data-lucide="mouse-pointer-click"></i><span><strong>Modo selección:</strong> Clic en fotos para seleccionarlas.</span><button class="btn btn-ghost btn-sm" onclick="exitSelectMode()">Salir</button></div>' +

        '</div></div>';

function findSecId(det, idx) {
    var c = 0;
    for (var si = 0; si < det.secciones.length; si++) {
        for (var i = 0; i < (det.secciones[si].fotos || []).length; i++) {
            if (c === idx) return det.secciones[si].id;
            c++;
        }
    }
    return null;
}
function switchSec(gid, sid) { currentSectionId = sid; var d = detalleCache[gid]; if (d) renderGalleryInner(gid, d); }

async function doDelFoto(galId, fotoId) {
    if (!confirm('¿Eliminar esta foto?')) return;
    try { await drive('eliminar_foto', { id: fotoId }); delete detalleCache[galId]; showToast('Eliminada', 'trash-2'); renderGalleryDetail(galId); }
    catch(e) { showToast('Error', 'alert-circle'); }
}
function showMoveFoto(galId, fotoId) {
    var d = detalleCache[galId]; if (!d) return;
    var opts = (d.secciones || []).filter(function(s) { return s.id !== galId; }).map(function(s) {
        return '<div class="move-target" onclick="doMoveFoto(\'' + escJS(galId) + '\',\'' + escJS(fotoId) + '\',\'' + escJS(s.id) + '\')"><i data-lucide="folder"></i><span>' + esc(s.nombre) + '</span><small>' + (s.fotos || []).length + '</small></div>';
    }).join('');
    if (!opts) { showToast('No hay otras secciones', 'alert-circle'); return; }
    openModal('<div class="modal-header"><h3>Mover Foto</h3><button class="btn btn-ghost btn-icon" onclick="closeModal()"><i data-lucide="x"></i></button></div><div class="modal-body">' + opts + '</div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button></div>');
}
async function doMoveFoto(galId, fotoId, destId) {
    try { await drive('mover_foto', { fotoId: fotoId, destinoId: destId }); closeModal(); delete detalleCache[galId]; showToast('Movida', 'folder-input'); renderGalleryDetail(galId); }
    catch(e) { showToast('Error', 'alert-circle'); }
}
function showAddSec(galId) {
    openModal('<div class="modal-header"><h3>Nueva Sección</h3><button class="btn btn-ghost btn-icon" onclick="closeModal()"><i data-lucide="x"></i></button></div><div class="modal-body"><div class="form-group"><label class="input-label">Nombre</label><input type="text" class="input" id="newSec" placeholder="Misa, Fiesta..."></div></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="doAddSec(\'' + escJS(galId) + '\')">Crear</button></div>');
    setTimeout(function() { var i = document.getElementById('newSec'); if (i) i.focus(); }, 150);
}
async function doAddSec(galId) {
    var n = (document.getElementById('newSec').value || '').trim();
    if (!n) { showToast('Ingresa nombre', 'alert-circle'); return; }
    try { await drive('crear_seccion', { id: galId, nombre: n }); closeModal(); showToast('"' + n + '" creada', 'check-circle'); delete detalleCache[galId]; renderGalleryDetail(galId); }
    catch(e) { showToast('Error', 'alert-circle'); }
}

        '<div class="form-group"><label class="input-label">Fecha</label><input type="date" class="input" id="covDate" value="' + esc(meta.fecha || '') + '" oninput="document.getElementById(\'cpD\').textContent=formatDateFull(this.value)"></div>' +
        '<div class="form-group"><label class="input-label">Título</label><input type="text" class="input" id="covT" value="' + esc(meta.titulo || '') + '" oninput="document.getElementById(\'cpT\').textContent=this.value||\'Título\'"></div>' +
        '<div class="form-group"><label class="input-label">Subtítulo</label><input type="text" class="input" id="covS" value="' + esc(meta.subtitle || '') + '" oninput="document.getElementById(\'cpS\').textContent=this.value"></div>' +
        '<div class="form-group"><label class="input-label">Frase (cursiva)</label><input type="text" class="input" id="covTg" value="' + esc(meta.tagline || '') + '" oninput="document.getElementById(\'cpTg\').textContent=this.value"></div>' +
        '<div class="form-group"><label class="input-label">Tipografía</label><div id="fontGrid">' + fontOpts + '</div></div>' +

function selectFont(id) {
    _selFont = id;
    document.querySelectorAll('.font-option').forEach(function(el) { el.classList.toggle('active', el.dataset.fid === id); });
    var t = document.getElementById('cpT');
    if (t) { t.style.cssText = 'color:#fff;' + getFontCSS(id, 28); }
}
async function doSaveCover(galId) {
    var coverId = document.getElementById('covPhoto').value || '';
    try {
        if (coverId) { try { await drive('sync', { id: coverId }); } catch(e) {} }
        await drive('guardar_meta', {
            id: galId,
            titulo: document.getElementById('covT').value,
            subtitle: document.getElementById('covS').value,
            tagline: document.getElementById('covTg').value,
            fecha: document.getElementById('covDate').value,
            font: _selFont,
            showCover: document.getElementById('covShow').checked ? 'true' : 'false',
            coverId: coverId
        });
        closeModal(); delete detalleCache[galId]; showToast('Portada guardada', 'check-circle'); renderGalleryDetail(galId);
    } catch(e) { showToast('Error: ' + e.message, 'alert-circle'); }
}

// ─── CONFIGURACIÓN ───────────────────────────────────────────────────────────
function showSettings() {
    openModal(
        '<div class="modal-header"><h3>Configuración</h3><button class="btn btn-ghost btn-icon" onclick="closeModal()"><i data-lucide="x"></i></button></div>' +
        '<div class="modal-body">' +

}
async function doSaveSettings() {
    var n = (document.getElementById('setName').value || '').trim();
    if (!n) { showToast('Ingresa nombre', 'alert-circle'); return; }
    var url  = (document.getElementById('setUrl').value || '').trim();
    var cont = (document.getElementById('setContact').value || '').trim();
    try {
        await drive('config', { nombre: n, contacto: cont });
        config.nombre = n; config.contacto = cont;
        saveConfigCache(config);
        if (url) DRIVE_URL = url;
        closeModal(); showToast('Guardado'); render();
    } catch(e) { showToast('Error', 'alert-circle'); }
}

// ─── VISTA CLIENTE ───────────────────────────────────────────────────────────
async function renderClientGallery(id) {
    isShareView = true; downloadUnlocked = false;
    document.getElementById('app').innerHTML =
        '<div class="loading-state" style="min-height:100vh"><div class="spinner"></div><p>Cargando galería</p><span class="loading-timer" id="cT">0.0s</span></div>';
    try { lucide.createIcons(); } catch(e) {}
    var stop = startTimer('cT');

    var cached = loadConfigCache();
    if (cached) { config = cached; }
    else { try { config = await drive('config'); saveConfigCache(config); } catch(e) {} }

    var d;
    try { d = await drive('detalle', { id: id }); } catch(e) {
        stop();
        document.getElementById('app').innerHTML = '<div class="not-found"><i data-lucide="image-off"></i><h2>Galería no encontrada</h2><p style="color:var(--text2);font-size:14px;margin-top:8px">El enlace puede estar incorrecto o la galería ya no existe.</p></div>';
        try { lucide.createIcons(); } catch(e2) {}
        return;
    }
    stop(); detalleCache[id] = d;

    if (d.expirada) {
        document.title = esc(d.nombre);
        document.getElementById('app').innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">' +
            '<div class="expired-banner"><i data-lucide="lock"></i><h3>Galería expirada</h3><p>Esta galería ya no está disponible. Contacta al fotógrafo si necesitas acceso.</p>' +
            (config.contacto ? '<button class="btn btn-primary" onclick="window.open(\'' + escJS(config.contacto) + '\',\'_blank\')"><i data-lucide="message-circle"></i> Contactar</button>' : '') +
            '</div></div>';
        try { lucide.createIcons(); } catch(e) {}
        return;
    }

    document.title = esc(d.nombre) + ' — ' + esc(config.nombre);
    var meta = d.meta || {};
    if (meta.showCover && d.coverUrl) { renderClientCover(id, d); return; }
    currentSectionId = 'all';
    renderClientInner(id, d);
}

function renderClientCover(galId, d) {
    var meta = d.meta || {};
    var fontId = meta.font || 'playfair';
    var title  = meta.titulo || d.nombre;
    var date   = meta.fecha ? formatDateFull(meta.fecha) : '';
    document.getElementById('app').innerHTML =
        '<div class="cover-page">' +
        '<div class="cover-bg ' + (d.coverUrl ? '' : 'cover-default') + '" style="' + (d.coverUrl ? 'background-image:url(\'' + esc(d.coverUrl) + '\')' : '') + '"></div>' +
        '<div class="cover-overlay"></div>' +
        '<div class="cover-content">' +
        '<div class="cover-title" style="' + getFontCSS(fontId, 0) + ';font-size:clamp(36px,8vw,72px)">' + esc(title) + '</div>' +
        (date ? '<div class="cover-subtitle">' + esc(date) + '</div>' : '') +
        (meta.subtitle ? '<div class="cover-subtitle" style="margin-top:4px">' + esc(meta.subtitle) + '</div>' : '') +
        (meta.tagline ? '<div class="cover-tagline">' + esc(meta.tagline) + '</div>' : '') +
        '<button class="cover-btn" onclick="currentSectionId=\'all\';renderClientInner(\'' + escJS(galId) + '\',detalleCache[\'' + escJS(galId) + '\'])"><i data-lucide="images"></i> Ver galería</button>' +
        '</div><div class="cover-photographer">Fotografía por <strong style="color:rgba(255,255,255,.65)">' + esc(config.nombre) + '</strong></div></div>';
    try { lucide.createIcons(); } catch(e) {}
}

function renderClientInner(galId, d) {
    var allP   = getAllPhotos(d);
    var photos = getSectionPhotos(d, currentSectionId);

    var secTabs = '<button class="section-tab ' + (currentSectionId === 'all' ? 'active' : '') + '" onclick="clientSwitch(\'' + escJS(galId) + '\',\'all\')">Todas <span class="count">' + allP.length + '</span></button>';
    secTabs += (d.secciones || []).map(function(s) {
        return '<button class="section-tab ' + (currentSectionId === s.id ? 'active' : '') + '" onclick="clientSwitch(\'' + escJS(galId) + '\',\'' + escJS(s.id) + '\')">' + esc(s.nombre) + ' <span class="count">' + (s.fotos || []).length + '</span></button>';
    }).join('');

    var photosHtml = !photos.length
        ? '<div class="empty-state" style="padding:40px 20px"><div class="empty-state-icon"><i data-lucide="image"></i></div><h3>Sin fotos</h3></div>'
        : '<div class="masonry">' + photos.map(function(p, i) {
            return '<div class="masonry-item" style="animation-delay:' + Math.min(i * 0.03, 0.3) + 's" onclick="clientLightbox(\'' + escJS(galId) + '\',\'' + escJS(currentSectionId) + '\',' + i + ')"><img src="' + esc(p.url) + '" alt="Foto" loading="lazy"></div>';
        }).join('') + '</div>';

    var hasCover = (d.meta && d.meta.showCover)
        ? '<button class="btn btn-ghost btn-sm" onclick="renderClientGallery(\'' + escJS(galId) + '\')"><i data-lucide="image"></i></button>'
        : '';

    document.getElementById('app').innerHTML =
        '<div><header class="client-header">' +
        '<div class="client-logo"><div class="client-logo-mark">' + esc(config.nombre.charAt(0).toUpperCase()) + '</div><div class="client-logo-text">' + esc(config.nombre) + '</div></div>' +
        hasCover +
        '<button class="client-download-btn" onclick="clientDownload(\'' + escJS(galId) + '\')"><i data-lucide="download"></i><span>Descargar</span></button>' +
        '</header>' +
        '<div class="client-info"><h1 style="font-family:var(--serif);font-size:clamp(22px,5vw,32px)">' + esc(d.nombre) + '</h1>' +
        '<div class="meta"><span><i data-lucide="image"></i> ' + allP.length + '</span><div class="meta-dot"></div><span><i data-lucide="folder"></i> ' + (d.secciones || []).length + '</span></div></div>' +
        '<div class="section-tabs" style="justify-content:center;max-width:600px;margin:0 auto 16px;padding:0 16px">' + secTabs + '</div>' +
        photosHtml +
        '<footer style="text-align:center;padding:24px 16px;color:var(--text3);font-size:11px">Fotografía por <strong style="color:var(--text2)">' + esc(config.nombre) + '</strong></footer></div>';
    try { lucide.createIcons(); } catch(e) {}
}

function clientSwitch(gid, sid) { currentSectionId = sid; var d = detalleCache[gid]; if (d) renderClientInner(gid, d); }
function clientLightbox(gid, sid, idx) { openLightbox(getSectionPhotos(detalleCache[gid], sid), idx); }

function clientDownload(galId) {
    if (downloadUnlocked) { doClientDL(galId); return; }
    var meta = (detalleCache[galId] || {}).meta || {};
    if (meta.downloadCode) { showCodeModal(galId); }
    else { showToast('Descargas no disponibles', 'alert-circle'); }
}

function showCodeModal(galId) {
    openModal(
        '<div class="modal-header"><h3>Descargar fotos</h3><button class="btn btn-ghost btn-icon" onclick="closeModal()"><i data-lucide="x"></i></button></div>' +
        '<div class="modal-body" style="text-align:center">' +
        '<div style="width:56px;height:56px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--text3)"><i data-lucide="lock" style="width:24px;height:24px"></i></div>' +
        '<p style="font-size:15px;color:var(--text);margin-bottom:4px;font-weight:500">Ingresa tu código de descarga</p>' +
        '<p style="font-size:13px;color:var(--text2);margin-bottom:20px">Este código te lo proporcionó tu fotógrafo.</p>' +
        '<div class="code-input"><input type="text" class="input" id="codeInput" placeholder="ABC123" maxlength="6" style="text-transform:uppercase;letter-spacing:.3em;font-family:monospace;font-size:18px;font-weight:600"><button class="btn btn-primary" onclick="verifyCode(\'' + escJS(galId) + '\')">Verificar</button></div>' +
        '<p id="codeError" style="font-size:13px;color:#dc2626;text-align:center;margin-top:12px;display:none">Código incorrecto.</p>' +
        '</div>'
    );
    setTimeout(function() { var i = document.getElementById('codeInput'); if (i) { i.focus(); i.addEventListener('keydown', function(e) { if (e.key === 'Enter') verifyCode(galId); }); } }, 150);
}

async function verifyCode(galId) {
    var code = (document.getElementById('codeInput').value || '').toUpperCase().trim();
    var errEl = document.getElementById('codeError');
    if (!code) {
        if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Ingresa un código.'; }
        return;
    }
    try {
        var r = await drive('verificar_codigo', { id: galId, codigo: code });
        if (r.valido) {
            downloadUnlocked = true;
            closeModal();
            showToast('¡Código correcto! Ya puedes descargar.', 'check-circle');
            doClientDL(galId);
        } else {
            if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Código incorrecto. Verifica e intenta de nuevo.'; }
        }
    } catch(e) {
        if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Error al verificar. Intenta de nuevo.'; }
    }
}

async function doClientDL(galId) {
    var d = detalleCache[galId];
    var photos = getSectionPhotos(d, currentSectionId);
    if (!photos.length) return;

    if (typeof JSZip !== 'undefined') {
        openModal(
            '<div class="modal-body" style="text-align:center;padding:32px 24px">' +
            '<div class="spinner" style="width:32px;height:32px;margin:0 auto 16px"></div>' +
            '<p style="font-weight:500;margin-bottom:4px">Preparando descarga</p>' +
            '<div class="dl-progress"><div class="dl-progress-bar"><div class="dl-progress-fill" id="dlFill"></div></div>' +
            '<p class="dl-progress-text" id="dlTxt">0 / ' + photos.length + ' fotos</p></div>' +
            '</div>'
        );

        var zip = new JSZip();
        var folder = zip.folder(d.nombre || 'galeria');

        for (var i = 0; i < photos.length; i++) {
            try {
                var resp = await fetch(photos[i].url);
                var blob = await resp.blob();
                folder.file(photos[i].nombre || ('foto_' + (i + 1) + '.jpg'), blob);
            } catch(e) {}
            var pct = Math.round(((i + 1) / photos.length) * 100);
            var fill = document.getElementById('dlFill');
            var txt  = document.getElementById('dlTxt');
            if (fill) fill.style.width = pct + '%';
            if (txt)  txt.textContent = (i + 1) + ' / ' + photos.length + ' fotos';
        }

        try {
            var zipBlob = await zip.generateAsync({ type: 'blob' });
            var url = URL.createObjectURL(zipBlob);
            var a = document.createElement('a');
            a.href = url; a.download = (d.nombre || 'galeria') + '.zip';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(function() { URL.revokeObjectURL(url); }, 10000);
            closeModal();
            showToast('ZIP descargado (' + photos.length + ' fotos)', 'download');
        } catch(e) {
            closeModal();
            showToast('Error al crear ZIP', 'alert-circle');
        }
    } else {
        showToast('Descargando ' + photos.length + ' fotos...', 'download');
        photos.forEach(function(p, i) {
            setTimeout(function() { downloadFile(p.url, p.nombre || 'foto_' + (i + 1) + '.jpg'); }, i * 400);
        });
    }
}

// ─── INICIO ───────────────────────────────────────────────────────────────────
(function init() {
    try {
        var params = new URLSearchParams(location.search);
        var gId = params.get('g');
        if (gId) { isShareView = true; renderClientGallery(gId); return; }
    } catch(e) {}
    try { render(); } catch(e) {
        console.error('Init:', e);
        document.getElementById('app').innerHTML = '<div class="not-found"><i data-lucide="alert-triangle"></i><h2>Error al iniciar</h2><button class="btn btn-primary" onclick="render()">Reintentar</button></div>';
        try { lucide.createIcons(); } catch(e2) {}
    }
})();
</script>
</body>
</html>
